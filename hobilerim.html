<script>
    var map = L.map('map').setView([39.93, 32.85], 6); // Başlangıç noktası Ankara (Türkiye'yi görecek kadar uzaklaştırdık)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // Eğitim, İş ve Seyahat Noktaların
    var locations = [
        {coords: [39.93, 32.85], name: "Ankara (Eğitim & Yaşam)"},
        {coords: [41.00, 28.97], name: "İstanbul (Seyahat)"},
        {coords: [38.42, 27.14], name: "İzmir (Seyahat)"},
        {coords: [41.37, 33.77], name: "Kastamonu (Seyahat)"}
    ];

    locations.forEach(function(loc) {
        L.marker(loc.coords).addTo(map).bindPopup(loc.name);
    });
</script>
